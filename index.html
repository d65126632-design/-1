<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人財經戰情室 - GitHub 修正版</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --bg: #0b0c10; --sidebar-bg: #1f2833; --active-blue: #66fcf1; --text: #fff; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar-bg); padding: 20px 10px; border-right: 2px solid #45a29e; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
        .nav-btn { min-height: 50px; padding: 10px; background: #333; border: 1px solid #45a29e; color: #fff; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: center; }
        .nav-btn.active { background-color: var(--active-blue) !important; color: #000 !important; font-weight: bold; }
        .content-area { flex: 1; position: relative; background: #131722; height: 100vh; }
        .view-pane { display: none; width: 100%; height: 100%; border: none; overflow: auto; }
        .view-pane.active { display: block; }
        .text-content { padding: 20px; color: #333; background: #f4f4f4; height: 100%; box-sizing: border-box; }
        .stock-table { width: 100%; border-collapse: collapse; background: white; color: #000; }
        .stock-table th, .stock-table td { border: 1px solid #aaa; padding: 8px; text-align: center; }
        .stock-table th { background-color: #444; color: #fff; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="nav-btn active" onclick="sw(this, 'us-pane')">美股熱力圖</button>
    <!-- 使用您提供的精確網址 -->
    <button class="nav-btn" onclick="sw(this, 'ifr-pane', 'https://nstock.tw/market_index/heatmap?t1=0&t2=0&t3=0&t4=1&t5=0&iid&nh=0')">台股上市熱力圖</button>
    <button class="nav-btn" onclick="sw(this, 'ifr-pane', 'https://nstock.tw/market_index/heatmap?t1=1&t2=0&t3=0&t4=1&t5=0&iid&nh=0')">台股上櫃熱力圖</button>
    <button class="nav-btn" onclick="sw(this, 'csv-pane')">選股專區 5-10-20</button>
    <button class="nav-btn" onclick="sw(this, 'ifr-pane', '紀律.pdf')">持股分析進出紀律</button>
</div>

<div class="content-area">
    <!-- 美股區域：Widget 模式 -->
    <div id="us-pane" class="view-pane active">
        <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
            <div class="tradingview-widget-container__widget" style="height: 100%; width: 100%;"></div>
            <script type="text/javascript" src="https://tradingview.com" async>
            { "dataSource": "Spx500", "blockSize": "market_cap", "blockColor": "change", "locale": "zh_TW", "colorTheme": "dark", "width": "100%", "height": "100%" }
            </script>
        </div>
    </div>

    <!-- 關鍵：加上 referrerpolicy 嘗試避開 Nstock 的來源檢查 -->
    <iframe id="ifr-pane" class="view-pane" src="" referrerpolicy="no-referrer"></iframe>

    <div id="csv-pane" class="view-pane text-content">
        <div id="csv-status" style="font-weight:bold; color:green; margin-bottom:10px;">等待載入...</div>
        <div id="csv-display" style="overflow-x: auto;"></div>
    </div>
</div>

<script>
    function sw(btn, paneId, url = "") {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(paneId).classList.add('active');
        
        if (paneId === 'ifr-pane') {
            const ifr = document.getElementById('ifr-pane');
            ifr.src = "about:blank"; // 先清空防止跳轉
            setTimeout(() => { ifr.src = url; }, 50);
        } else if (paneId === 'csv-pane') {
            autoLoadCSV();
        }
    }

    async function autoLoadCSV() {
        const display = document.getElementById('csv-display');
        const status = document.getElementById('csv-status');
        try {
            const response = await fetch('stock.csv?t=' + Date.now());
            if (response.ok) {
                const blob = await response.blob();
                const reader = new FileReader();
                reader.onload = function(e) {
                    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
                    let html = '<table class="stock-table">';
                    lines.forEach((line, i) => {
                        const cols = line.split(',');
                        html += '<tr>' + cols.map(c => i===0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('') + '</tr>';
                    });
                    html += '</table>';
                    display.innerHTML = html;
                    status.innerText = "✅ 成功載入 stock.csv";
                };
                reader.readAsText(blob, 'Big5');
            }
        } catch (e) { status.innerText = "❌ 找不到 CSV。"; }
    }
</script>

</body>
</html>
